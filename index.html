<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FelixMods | Minecraft Social Media</title>
    <link rel="stylesheet" href="style.css">
    <!-- Panggil CDN Supabase JS Resmi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Navbar Atas Ala Menu Minecraft -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">⛏️ Felix-Mods</h1>
            <div id="auth-buttons">
                <!-- Tombol bakal berubah dinamis lewat JavaScript nanti -->
                <button id="btn-login" class="mc-button">Login / Register</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Area Bikin Postingan Baru (Hanya Muncul/Bisa Diklik Kalau Udah Login) -->
        <section id="create-post-box" class="mc-panel" style="display: none;">
            <h3>Share Your Minecraft Adventure!</h3>
            <textarea id="post-content" placeholder="Ada kabar seru apa di world lu hari ini, bray?..." rows="3"></textarea>
            
            <div class="post-actions">
                <label for="post-image" class="mc-button-secondary">
                    📸 Add Screenshot
                </label>
                <input type="file" id="post-image" accept="image/*" style="display: none;">
                <span id="file-name-preview">Gak ada gambar dipilih</span>
                <button id="btn-submit-post" class="mc-button">Post 🚀</button>
            </div>
        </section>

        <!-- Container Tempat Semua Feed Postingan Muncul -->
        <section id="feed-container">
            <div class="loading">Loading feed dari world... 🔄</div>
        </section>
    </main>
<!-- ========================================== -->
    <!-- CUSTOM MODAL AUTH (LOGIN & REGISTER)       -->
    <!-- ========================================== -->
    <div id="auth-modal" class="modal-overlay" style="display: none;">
        <div class="mc-panel modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Minecraft Sign In</h3>
                <button id="btn-close-modal" class="close-x">&times;</button>
            </div>
            
            <form id="auth-form">
                <!-- Input Utama (Login & Register Butuh Ini) -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="auth-email" placeholder="steve@craft.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" placeholder="******" required>
                </div>

                <!-- Input Tambahan (Hanya Muncul Saat Mode Register) -->
                <div id="register-fields" style="display: none;">
                    <div class="form-group">
                        <label>Social Media Username</label>
                        <input type="text" id="auth-username" placeholder="FelixMods">
                    </div>
                    <div class="form-group">
                        <label>Minecraft Nickname (For Skin/Avatar)</label>
                        <input type="text" id="auth-mc-username" placeholder="Steve">
                    </div>
                </div>

                <button type="submit" id="btn-modal-submit" class="mc-button" style="width: 100%; margin-top: 15px;">Sign In ⚔️</button>
            </form>

            <div class="modal-footer-toggle">
                <p id="toggle-auth-text">Belum punya akun? <a href="#" id="link-switch-auth">Daftar Akun Baru</a></p>
            </div>
        </div>
    </div>
    <!-- Panggil logic JS kita -->
    <script src="app.js"></script>
</body>
                  </html>
