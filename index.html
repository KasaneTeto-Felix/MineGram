<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="AHPjgFk5NA3HIlaYKwilr0iGcnlMg0OJH0s-jFbjOwM" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FelixMods | Social Media Petualang</title>
    <link rel="stylesheet" href="style.css">
    <!-- Panggil CDN Supabase JS Resmi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css">
    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>
</head>
<body>

    <!-- Navbar Atas Ala Menu Minecraft -->
    <nav class="navbar">
    <div class="nav-container">
        <!-- Ganti <h1> dengan <img> -->
        <a href="/" class="logo-link">
            <img src="minegram.png" alt="MineGram" class="nav-logo">
            <span class="brand-text">MineGram</span>
        </a>
        <div id="auth-buttons">
            <button id="btn-login" class="mc-button">Login / Register</button>
        </div>
    </div>
</nav>

    <!-- Main Container - Hanya Berisi Feed -->
    <main class="container">
        <section id="feed-container">
            <div class="loading">Loading feed dari world... 🔄</div>
        </section>
    </main>

    <!-- Modal Posting (Trigger via tombol '+' di Bottom Nav) -->
    <div id="post-modal" class="modal-overlay" style="display: none;">
        <div class="mc-panel modal-content">
            <div class="modal-header">
                <h3>New Adventure</h3>
                <button id="btn-close-post" class="close-x">&times;</button>
            </div>
            <textarea id="post-content" placeholder="Ada kabar seru apa di world lu hari ini, bray?..." rows="4"></textarea>
            <div class="post-actions">
                <label for="post-image" class="mc-button-secondary">📸 Select Image</label>
                <input type="file" id="post-image" accept="image/*" style="display: none;">
                <span id="file-name-preview">No file</span>
            </div>
            <button id="btn-submit-post" class="mc-button" style="width: 100%; margin-top: 15px;">Share to World 🚀</button>
        </div>
    </div>

    <!-- Custom Modal Auth (Login & Register) -->
    <div id="auth-modal" class="modal-overlay" style="display: none;">
        <div class="mc-panel modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Minecraft Sign In</h3>
                <button id="btn-close-modal" class="close-x">&times;</button>
            </div>
            
            <form id="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="auth-email" placeholder="steve@craft.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" placeholder="******" required>
                </div>

                <div id="register-fields" style="display: none;">
                    <div class="form-group">
                        <label>Social Media Username</label>
                        <input type="text" id="auth-username" placeholder="FelixMods">
                    </div>
                    <div class="form-group">
                        <label>Minecraft Nickname (For Skin/Avatar)</label>
                        <input type="text" id="auth-mc-username" placeholder="Steve">
                    </div>
                </div>

                <button type="submit" id="btn-modal-submit" class="mc-button" style="width: 100%; margin-top: 15px;">Sign In ⚔️</button>
            </form>

            <div class="modal-footer-toggle">
                <p id="toggle-auth-text">Belum punya akun? <a href="#" id="link-switch-auth">Daftar Akun Baru</a></p>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar Ala Instagram -->
    <!-- BOTTOM NAVIGATION BAR (SVG ICONS) -->
<!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
    <a href="#" class="nav-item active" data-action="home" id="nav-home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span class="nav-text">Home</span>
    </a>
    <a href="#" class="nav-item" data-action="post" id="nav-add-post">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span class="nav-text">Post</span>
    </a>
    <a href="#" class="nav-item" data-action="profile" data-target="profile-modal">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span class="nav-text">Profile</span>
    </a>
</nav>

<!-- 1. Modal Utama Edit Profil -->
<div id="profile-modal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
    <div class="modal-content" style="background:#1a1a1a; padding:30px; border-radius:16px; width:400px; color:white; position:relative;">
        <button onclick="closeEditProfile()" style="position:absolute; top:10px; right:15px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
        <h2>Edit profil</h2>
        
        <div style="text-align:center; margin-bottom:15px;">
            <img id="profile-preview" src="https://minotar.net/helm/Steve/100.png" style="width:100px; height:100px; border-radius:50%; object-fit:cover; cursor:pointer;">
            <p onclick="document.getElementById('file-input').click()" style="color:#0095f6; cursor:pointer; margin-top:5px;">Edit gambar</p>
            <input type="file" id="file-input" accept="image/*" style="display:none;">
        </div>

        <input type="text" id="edit-username" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #444;">
        <input type="text" id="edit-mc-username" placeholder="Minecraft Username" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #444;">
        <textarea id="edit-bio" placeholder="Bio" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #444; height:80px;"></textarea>
        
        <button onclick="saveProfile()" class="btn-save" style="width:100%; padding:10px; background:#55ff55; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Selesai</button>
    </div>
</div>

<!-- 2. Modal Cropper -->
<div id="cropper-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; z-index:999999;">
    <div style="width:90%; max-width:400px; background:#1a1a1a; padding:20px; text-align:center; border-radius:10px;">
        <img id="image-to-crop" style="max-width:100%;">
        <div style="margin-top:20px;">
            <button onclick="cropAndUpload()" style="padding:10px 20px; background:#55ff55; border:none; border-radius:5px; cursor:pointer;">Crop & Simpan</button>
            <button onclick="closeEditProfile()" style="padding:10px 20px; background:#ff4444; border:none; border-radius:5px; color:white; cursor:pointer; margin-left:10px;">Batal</button>
        </div>
    </div>
</div>
<!-- Container Notifikasi -->
<div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 2147483647"></div>
    <script src="app.js" defer></script>
</body>
</html>
